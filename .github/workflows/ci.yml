name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        # ruff is CI-only — it is deliberately not in requirements.txt, which the
        # desktop launcher pip-installs for end users.
        run: |
          pip install -r backend/requirements.txt
          pip install ruff==0.15.21

      - name: Lint
        run: ruff check backend InstaContentEngine.pyw

      - name: Test
        working-directory: backend
        run: pytest -q
